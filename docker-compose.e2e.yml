name: vidistiller-e2e

# Full stack for E2E testing. Requires E2E_DATABASE_URL env var.
# Usage: E2E_DATABASE_URL=<your-db-url> docker compose -f docker-compose.e2e.yml up

services:
  postgres:
    image: postgres:15-alpine
    container_name: e2e_postgres
    environment:
      POSTGRES_USER: ${E2E_DB_USER:-test_user}
      POSTGRES_PASSWORD: ${E2E_DB_PASSWORD:-test_pw}
      POSTGRES_DB: ${E2E_DB_NAME:-test_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${E2E_DB_USER:-test_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e_network

  redis:
    image: redis:7-alpine
    container_name: e2e_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e_network

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    container_name: e2e_api
    environment:
      DATABASE_URL: ${E2E_DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${E2E_JWT_SECRET:-E2eTestSecretKey123_abcDEF_ci_only!}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: WARNING
      ENVIRONMENT: testing
      DATA_DIR: /data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - e2e_network

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: e2e_celery_worker
    command: python3 -m celery -A app.tasks worker --loglevel=warning
    environment:
      DATABASE_URL: ${E2E_DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${E2E_JWT_SECRET:-E2eTestSecretKey123_abcDEF_ci_only!}
      ENVIRONMENT: testing
      LOG_LEVEL: WARNING
      DATA_DIR: /data
    depends_on:
      - postgres
      - redis
    networks:
      - e2e_network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    container_name: e2e_web
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - e2e_network

networks:
  e2e_network:
    driver: bridge
