# ShipGuard configuration for vidistiller
# Reviewed 2026-04-02

# Accepted CVEs (no upstream fix available as of 2026-04-02)
# CVE-2024-23342: ecdsa>=0 — timing side-channel (CVSS 7.4, AC:High).
#   Transitive dep of python-jose; no patched version exists. Fix: migrate to
#   PyJWT (tracked as separate task). Risk accepted: AC:High makes exploitation
#   difficult in practice.
# CVE-2026-27135: nghttp2 OS package (Debian trixie 1.64.0-1.1) — no fix
#   available from Debian. Transitive dep of libcurl/curl (healthcheck). Risk
#   accepted: waiting on upstream patch.

exclude_paths:
  - "node_modules/**"
  - ".next/**"
  - ".venv/**"
  - ".venv312/**"
  - "backend/data/**"
  - "e2e-report*/**"
  - "e2e-results/**"

disable_rules:
  # SC-003: npm install without lockfile — flagging GitHub Actions CI steps;
  # Dockerfiles use `npm ci` (frozen). CI uses npm install for test setup only.
  - SC-003
  # JS-006: innerHTML — in features_to_add/ scratch files, not production code
  - JS-006
  # PY-012: NamedTempFile delete=False — in test/utility code with manual cleanup
  - PY-012
  # PY-007: f-string SQL injection rule in shipguard 0.4.0 matches SQL keyword
  # substrings ("create", "delete", etc.) inside docstrings, Pydantic
  # Field(description=...), SQLAlchemy relationship() declarations, and
  # @patch(create=True). All 53 reported findings audited 2026-05-09 were
  # false positives; the codebase uses SQLAlchemy ORM end-to-end with no raw
  # f-string SQL. Re-enable when the rule is corrected upstream.
  - PY-007
