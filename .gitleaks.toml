# gitleaks config for vidistiller
# Detects credentials (default rules) + PII (custom rules).
# See docs/github-repo-hardening.md (Phase 6) in the project-scaffold repo.

title = "vidistiller gitleaks config"

[extend]
useDefault = true

# ---- Custom PII rules ----
# Tuned to reduce false positives on real code (timestamps, version numbers, etc.)

[[rules]]
id = "personal-email"
description = "Personal email addresses (gmail, yahoo, outlook, etc.)"
# Require word boundary + common personal email domains.
# Non-capturing group is required: with a capturing group gitleaks reports the
# captured domain (e.g. "gmail") as the Secret instead of the full email, which
# also breaks allowlist regexes that match on the address.
regex = '''(?i)\b[a-zA-Z0-9._%+-]+@(?:gmail|yahoo|outlook|hotmail|icloud|aol|protonmail)\.com\b'''
tags = ["pii", "email"]

[[rules]]
id = "us-phone-number"
description = "US phone numbers (strict — must look like a phone)"
# Use Go-compatible regex (no (?x) verbose mode).
# Require either (xxx) xxx-xxxx OR xxx.xxx.xxxx OR xxx-xxx-xxxx format.
# Word boundaries exclude timestamps like 20260510T134349Z.
regex = '''\b(?:\(\d{3}\)\s?\d{3}[.-]\d{4}|\d{3}[.-]\d{3}[.-]\d{4})\b'''
tags = ["pii", "phone"]

[[rules]]
id = "us-ssn"
description = "US Social Security Numbers"
regex = '''\b\d{3}-\d{2}-\d{4}\b'''
tags = ["pii", "ssn"]

[[rules]]
id = "credit-card"
description = "Credit card numbers (Visa, MC, Amex, Discover)"
regex = '''\b(?:4\d{3}|5[1-5]\d{2}|3[47]\d{2}|6(?:011|5\d{2}))[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b'''
tags = ["pii", "financial"]

[[rules]]
id = "ipv4-address"
description = "Operator internal IPv4 ranges (10.255.x.x) — documentation placeholders like 10.0.x.x are allowed"
# Scoped to the operator's real internal range; a generic IPv4 regex flags
# documentation placeholders and produces only false positives.
# NOTE: gitleaks has no per-rule "enabled" field — to disable a rule, remove it.
regex = '''\b10\.255\.\d{1,3}\.\d{1,3}\b'''
tags = ["network"]

[allowlist]
description = "Global allowlist"
paths = [
  '''\.lock$''',
  '''package-lock\.json$''',
  '''yarn\.lock$''',
  '''\.gitleaks\.toml$''',
  '''\.log$''',
  '''\.jsonl$''',
  '''node_modules/.*''',
  '''target/.*''',
  '''dist/.*''',
  '''build/.*''',
  '''__pycache__/.*''',
  '''\.pytest_cache/.*''',
  '''\.next/.*''',
  # Auditor-controlled reports under docs/audits/ may legitimately cite
  # operational artifacts (operator IPv4 ranges, historical author emails)
  # when describing findings. The authoritative scrub is the redaction
  # commit on the PR (which removed the actual matches); this allowlist
  # silences the same-content re-firing from each commit in the PR range
  # scan, since gitleaks reports findings from every commit in --log-opts,
  # not just the final state. Same trade-off as the already-accepted-
  # residual CHANGELOG.md history (personal email + IPv4 from 2026-04
  # commits sit in CHANGELOG.md and were grandfathered via similar
  # accepted-residual acceptance, not via this allowlist).
  '''docs/audits/.*''',
]
regexes = [
  '''example\.com''',
  '''placeholder@''',
  '''xxx-xx-xxxx''',
  '''your[_-]?email''',
  '''noreply@''',
  # Public throwaway dev key in .env.example — base64 of
  # "DEV-ONLY-INSECURE-CHANGE-ME-0000". Not a secret by construction.
  '''^REVWLU9OTFktSU5TRUNVUkUtQ0hBTkdFLU1FLTAwMDA=$''',
  # Truncated JWTs in OpenAPI doc examples. A token ending in literal dots is
  # never a real credential, so this cannot mask a live token.
  '''^eyJ[A-Za-z0-9_.-]*\.\.\.$''',
]
