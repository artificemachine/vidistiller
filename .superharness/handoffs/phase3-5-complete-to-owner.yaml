## Phase 3 — react-player v3 + VideoPlayer.tsx

Replaced react-player v2 with v3 in `frontend/package.json`. Rewrote
`frontend/components/VideoPlayer.tsx` to use the v3 API: `src` prop instead
of `url`, native `HTMLVideoElement` ref, `videoRef.current.currentTime` for
seek, `onReady` callback for ready state.

Deployed to LXC (`10.255.181.10`). Resolved cascading TypeScript errors
(`slideText`, `hasSlideText` prop mismatches) by doing a full frontend rsync
rather than syncing individual files.

