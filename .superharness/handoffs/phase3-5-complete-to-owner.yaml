## Phase 4 — youtube_url → video_url + source_type

Migration 012 (Alembic) renamed `youtube_url` → `video_url` and added
`source_type` column to both `processing_jobs` and `videos` tables.

Backend: `VideoService` replaces `YouTubeService`, `SourceType` enum, `VideoSourceResolver`,
`CaptionProvider` abstraction. `llm.py` (`summarize_transcript_sections`,
`_assemble_output`, `_prepend_title_header`) now accepts `source_type` and
writes `Source: <url> (<source_type>)` in Markdown output. Celery tasks pass
`job.source_type` through.

Tests updated across all test files: `conftest.py`, `test_api_routes.py`,
`test_job_export_import.py`, `test_snapshot_routes.py`, `test_security.py`,
`test_transcript_service.py`, `test_snapshot_service.py`, `test_llm_two_pass.py`,
`test_lxc_deploy.py`, `test_slide_routes.py`, `test_video_routes.py`.

Frontend: `VideoSubmission.tsx` field name, label, and placeholder updated.
`__tests__/pages/JobDetail.test.tsx` fixture updated.

Import backward compat: `job_import.py` falls back to `job_data.get("youtube_url")`
for old export JSON files.

