decisions:
- id: lxc-compose-project-keep-viddocs
  date: '2026-04-17'
  decision: >
    Keep LXC Docker Compose project name as "viddocs" (containers: tutorial_*)
    rather than running docker compose down/up to rename to "vidistiller".
  reason: >
    A cold restart would recreate all volumes, risking data loss in Postgres.
    The name change is cosmetic on the server side and not worth the risk
    without a backup/migration plan.
  alternatives: >
    Full down/up with a pg_dump backup first — defer to a dedicated migration task.

- id: import-backward-compat-youtube-url
  date: '2026-04-17'
  decision: >
    Keep job_import.py fallback: job_data.get("video_url") or job_data.get("youtube_url")
  reason: >
    Users may have existing export JSON files with the old "youtube_url" field.
    Silent fallback prevents import breakage.

