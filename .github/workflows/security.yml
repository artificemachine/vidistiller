name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install shipguard
        run: python -m pip install --upgrade pip shipguard

      - name: Run shipguard scan
        run: shipguard scan . --format json --output report.shipguard.json

      - name: Enforce severity policy
        run: |
          python - <<'PY'
          import json
          from collections import Counter

          with open('report.shipguard.json') as f:
              data = json.load(f)
          findings = data.get('findings', [])
          c = Counter((x.get('severity') or 'unknown').lower() for x in findings)
          blockers = c.get('critical', 0) + c.get('high', 0)
          print('Findings by severity:', dict(c))
          if blockers > 0:
              raise SystemExit(f'Blocking security findings: critical+high={blockers}')
          PY
