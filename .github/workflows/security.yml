name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install shipguard
        run: python -m pip install --upgrade pip shipguard

      - name: Run shipguard scan
        run: shipguard scan . --format json --output report.shipguard.json || true

      - name: Enforce severity policy
        run: |
          python - <<'PY'
          import json
          from collections import Counter

          with open('report.shipguard.json') as f:
              data = json.load(f)
          findings = data.get('findings', [])
          c = Counter((x.get('severity') or 'unknown').lower() for x in findings)
          blockers = c.get('critical', 0) + c.get('high', 0)
          print('Findings by severity:', dict(c))
          if blockers > 0:
              raise SystemExit(f'Blocking security findings: critical+high={blockers}')
          PY
