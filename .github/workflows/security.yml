name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install shipguard
        run: python -m pip install --upgrade pip shipguard

      - name: Run shipguard scan
        # --severity high: exit non-zero only on high/critical, matching the
        # severity policy enforced below (mediums are reported, not blocking).
        # The former --exclude-rules GHA-002 workaround was dropped at shipguard
        # 0.5.2, where that false positive no longer fires.
        run: shipguard scan . --severity high --format json --output report.shipguard.json

      - name: Enforce severity policy
        run: |
          python - <<'PY'
          import json
          from collections import Counter

          with open('report.shipguard.json') as f:
              data = json.load(f)
          findings = data.get('findings', [])
          c = Counter((x.get('severity') or 'unknown').lower() for x in findings)
          blockers = c.get('critical', 0) + c.get('high', 0)
          print('Findings by severity:', dict(c))
          if blockers > 0:
              raise SystemExit(f'Blocking security findings: critical+high={blockers}')
          PY

      # Python dependency CVEs were previously unscanned in CI. pip-audit covers
      # the backend requirements set, which includes yt-dlp and pillow — both of
      # which process untrusted, user-supplied input (video URLs and extracted
      # frames respectively).
      - name: Audit Python dependencies
        # PYSEC-2026-1325 (ecdsa side-channel) is ignored deliberately. ecdsa is
        # pulled in transitively by python-jose and has no upstream fix. The
        # vulnerable code path is ECDSA signing, which this app never reaches:
        # JWTs are signed with HS256 (symmetric HMAC), set in
        # backend/app/core/config.py. Re-evaluate if jwt.algorithm ever changes
        # to an EC algorithm, or if upstream publishes a fix.
        run: |
          python -m pip install pip-audit
          pip-audit --requirement backend/requirements.txt \
            --ignore-vuln PYSEC-2026-1325 \
            --progress-spinner off
