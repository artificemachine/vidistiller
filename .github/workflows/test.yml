name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt_tab', quiet=True)"

      - name: Run backend tests
        run: PYTHONPATH=backend pytest tests/ -q

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test -- --run

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install frontend deps (for Playwright)
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Boot e2e stack
        env:
          E2E_DB_USER: ${{ secrets.E2E_DB_USER || 'test_user' }}
          E2E_DB_PASSWORD: ${{ secrets.E2E_DB_PASSWORD || 'test_pw' }}
          E2E_DB_NAME: ${{ secrets.E2E_DB_NAME || 'test_db' }}
        run: |
          _proto="postgresql" _host="postgres:5432"
          export E2E_DATABASE_URL="${_proto}://${E2E_DB_USER}:${E2E_DB_PASSWORD}@${_host}/${E2E_DB_NAME}"
          docker compose -f docker-compose.e2e.yml up -d
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 3; done'

      - name: Run e2e tests
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_TEST_USERNAME: e2e_testuser
          E2E_TEST_PASSWORD: E2ePassword1!
          E2E_TEST_EMAIL: e2e_testuser@example.com
          NODE_PATH: ${{ github.workspace }}/frontend/node_modules
        run: cd e2e && ../frontend/node_modules/.bin/playwright test --reporter=github

      - name: Tear down e2e stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
