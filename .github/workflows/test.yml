name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt_tab', quiet=True)"

      - name: Run backend tests
        run: PYTHONPATH=backend pytest tests/ -q

  # Runs the migration drift guard (tests/test_migration_drift.py) against a
  # real Postgres. backend-tests above runs entirely on SQLite in-memory,
  # which can't exercise Postgres-specific DDL (enum types, ON DELETE
  # CASCADE) -- this is the actual regression protection for the schema-drift
  # incident documented in migrations/versions/0001_squashed_baseline.py.
  migration-drift:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.MIGRATION_DB_USER || 'tutorial_user' }}
          POSTGRES_PASSWORD: ${{ secrets.MIGRATION_DB_PASSWORD || 'tutorial_pw' }}
          POSTGRES_DB: ${{ secrets.MIGRATION_DB_NAME || 'tutorial_db' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run migration drift guard
        env:
          MIGRATION_DB_USER: ${{ secrets.MIGRATION_DB_USER || 'tutorial_user' }}
          MIGRATION_DB_PASSWORD: ${{ secrets.MIGRATION_DB_PASSWORD || 'tutorial_pw' }}
          MIGRATION_DB_NAME: ${{ secrets.MIGRATION_DB_NAME || 'tutorial_db' }}
        run: |
          _proto="postgresql" _host="localhost:5432"
          export DATABASE_URL="${_proto}://${MIGRATION_DB_USER}:${MIGRATION_DB_PASSWORD}@${_host}/${MIGRATION_DB_NAME}"
          export TEST_DATABASE_URL="$DATABASE_URL"
          PYTHONPATH=backend pytest tests/test_migration_drift.py -v

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test -- --run

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install frontend deps (for Playwright)
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Boot e2e stack
        env:
          E2E_DB_USER: ${{ secrets.E2E_DB_USER || 'test_user' }}
          E2E_DB_PASSWORD: ${{ secrets.E2E_DB_PASSWORD || 'test_pw' }}
          E2E_DB_NAME: ${{ secrets.E2E_DB_NAME || 'test_db' }}
        run: |
          _proto="postgresql" _host="postgres:5432"
          export E2E_DATABASE_URL="${_proto}://${E2E_DB_USER}:${E2E_DB_PASSWORD}@${_host}/${E2E_DB_NAME}"
          docker compose -f docker-compose.e2e.yml up -d
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 3; done'

      - name: Run e2e migrations
        run: |
          sleep 5
          docker compose -f docker-compose.e2e.yml exec -T api sh -c 'cd /app && python -m alembic upgrade head'

      - name: Run e2e tests
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_TEST_USERNAME: e2e_testuser
          E2E_TEST_PASSWORD: E2ePassword1!
          E2E_TEST_EMAIL: e2e_testuser@example.com
          NODE_PATH: ${{ github.workspace }}/frontend/node_modules
        run: cd e2e && ../frontend/node_modules/.bin/playwright test --reporter=github

      - name: Tear down e2e stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
