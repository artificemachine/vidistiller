name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Scan only commits introduced by this PR
            gitleaks detect --source . --config .gitleaks.toml --redact --no-banner \
              --log-opts="origin/${{ github.base_ref }}..HEAD" --exit-code 1
          else
            # On push to main, scan only the pushed commit
            gitleaks detect --source . --config .gitleaks.toml --redact --no-banner \
              --log-opts="-1" --exit-code 1
          fi
