name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run alembic migrations after deploy'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  # ── 1. Backend tests (cloud runner) ────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt_tab', quiet=True)"

      - name: Run tests
        run: PYTHONPATH=backend pytest tests/ -q

  # ── 2. Frontend tests (cloud runner) ───────────────────────────────────────
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Run tests
        run: cd frontend && npm test -- --run

  # ── 3. Security gate (cloud runner) ────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Install ShipGuard
        run: pip install shipguard

      - name: Run SAST scan
        run: |
          shipguard scan . --format json > shipguard.json
          python3 - << 'EOF'
          import json, sys
          data = json.load(open("shipguard.json"))
          findings = data.get("findings", [])
          blockers = [f for f in findings if f.get("severity") in ("critical", "high")]
          if blockers:
              for b in blockers:
                  print(f"BLOCKER: [{b['severity'].upper()}] {b['rule_id']} — {b['file']}:{b.get('line', '?')}: {b['message']}")
              sys.exit(1)
          print(f"Security gate passed. {len(findings)} findings, 0 blockers.")
          EOF

  # ── 4. Docker Hub publish (cloud runner) ───────────────────────────────────
  #
  # Runs before deploy-production so the server always pulls the fresh image.
  # docker-publish.yml handles tag-based publishes; this job owns main-branch.
  publish:
    name: Publish images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push backend
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: newblacc/vidistiller-backend:latest,newblacc/vidistiller-backend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: newblacc/vidistiller-frontend:latest,newblacc/vidistiller-frontend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy to production (self-hosted runner on LXC) ────────────────────
  #
  # Runs directly on the LXC — no SSH tunnel needed. The runner has direct
  # access to Docker and the project directory.
  deploy-production:
    name: Deploy → production
    runs-on: [self-hosted, linux, vidistiller-prod]
    needs: [test-backend, test-frontend, security, publish]
    if: github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Sync compose and config files
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.prod.yml?ref=${{ github.sha }}" \
            -o docker-compose.prod.yml

      - name: Enable Sentry if DSN is configured
        if: env.SENTRY_DSN != ''
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          sed -i "s|^SENTRY_DSN=.*|SENTRY_DSN=${SENTRY_DSN}|" .env
          sed -i "s|^SENTRY_ENABLED=.*|SENTRY_ENABLED=true|" .env
          grep -q "^NEXT_PUBLIC_SENTRY_DSN=" .env \
            && sed -i "s|^NEXT_PUBLIC_SENTRY_DSN=.*|NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN}|" .env \
            || echo "NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN}" >> .env

      - name: Pull latest images
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          docker compose -f docker-compose.prod.yml pull

      - name: Ensure app-data ownership matches container uid
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          sudo mkdir -p app-data/videos app-data/snapshots app-data/slides
          sudo chown -R 1001:1001 app-data

      - name: Deploy
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Run migrations
        if: ${{ github.event.inputs.run_migrations != 'false' }}
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          sleep 8
          echo "Running alembic upgrade head..."
          docker compose -f docker-compose.prod.yml exec -T api sh -c 'cd /app && python -m alembic upgrade head'
          echo "Migrations complete."

      - name: Health check
        run: |
          sleep 12
          curl -sf http://10.255.181.20:8000/health || { echo "API health check failed"; exit 1; }
          echo "Deploy successful"

  # ── 6. Deploy to staging (self-hosted runner on staging LXC) ───────────────
  deploy-staging:
    name: Deploy → staging
    runs-on: [self-hosted, linux, vidistiller-staging]
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/staging'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - name: Pull latest images
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          docker compose -f docker-compose.yml -f docker-compose.staging.yml pull

      - name: Deploy staging
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans

      - name: Run migrations
        if: ${{ github.event.inputs.run_migrations != 'false' }}
        run: |
          cd "${VIDISTILLER_DIR:-/opt/vidistiller}"
          sleep 8
          echo "Running alembic upgrade head..."
          docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T api alembic upgrade head
          echo "Migrations complete."

      - name: Health check
        run: |
          sleep 12
          curl -sf http://localhost:8001/health || { echo "Staging health check failed"; exit 1; }
          echo "Staging deploy successful."
